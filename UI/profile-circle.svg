<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ring" gradientTransform="rotate(0)">
      <stop offset="0%" stop-color="#7aa2f7">
        <animate attributeName="stop-color" values="#7aa2f7;#bb9af7;#e0af68;#7aa2f7" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#bb9af7">
        <animate attributeName="stop-color" values="#bb9af7;#e0af68;#7aa2f7;#bb9af7" dur="4s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="80" cy="80" r="68" />
    </clipPath>
  </defs>

  <!-- Glow effect -->
  <circle cx="80" cy="80" r="76" fill="none" stroke="#7aa2f7" stroke-width="1" opacity="0.3">
    <animate attributeName="r" values="76;80;76" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.3;0.0;0.3" dur="3s" repeatCount="indefinite" />
  </circle>

  <!-- Animated gradient ring -->
  <circle cx="80" cy="80" r="74" fill="none" stroke="url(#ring)" stroke-width="3.5">
    <animate attributeName="stroke-width" values="3;5;3" dur="3s" repeatCount="indefinite" />
  </circle>

  <!-- Profile image embedded as base64 -->
  <image href="data:image/jpeg;base64," x="12" y="12" width="136" height="136" clip-path="url(#circle)" />
</svg>
