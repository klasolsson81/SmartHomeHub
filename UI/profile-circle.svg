<svg xmlns="http://www.w3.org/2000/svg" width="170" height="170" viewBox="0 0 170 170">
  <foreignObject width="170" height="170">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:170px;height:170px;display:flex;align-items:center;justify-content:center;">
      <style>
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        @keyframes pulse {
          0%, 100% { opacity: 0.4; transform: scale(1); }
          50% { opacity: 0; transform: scale(1.05); }
        }
        .ring-wrap {
          position: relative;
          width: 160px;
          height: 160px;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .glow {
          position: absolute;
          width: 160px;
          height: 160px;
          border-radius: 50%;
          border: 2px solid #7aa2f7;
          animation: pulse 3s ease-in-out infinite;
        }
        .ring {
          position: absolute;
          width: 156px;
          height: 156px;
          border-radius: 50%;
          background: conic-gradient(#7aa2f7, #bb9af7, #e0af68, #7aa2f7);
          animation: spin 4s linear infinite;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .ring-inner {
          width: 148px;
          height: 148px;
          border-radius: 50%;
          background: #1a1b27;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .avatar {
          width: 140px;
          height: 140px;
          border-radius: 50%;
          object-fit: cover;
        }
      </style>
      <div class="ring-wrap">
        <div class="glow"></div>
        <div class="ring">
          <div class="ring-inner">
            <img class="avatar" src="data:image/jpeg;base64," />
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
